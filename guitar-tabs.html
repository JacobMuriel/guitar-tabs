<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guitar Tab Viewer</title>

<!--
  Guitar Tab Viewer — a single self-contained HTML file.
  Rendering is done by alphaTab (https://alphatab.net), loaded from the jsDelivr CDN.
  We pin an exact version (1.8.3) so a future library update can never silently
  change behaviour or break this file. The only thing this file needs is an
  internet connection (to fetch alphaTab + its music fonts the first time).

  Everything else — the editor, the saved-song library, export/import — is plain
  browser code with no server, no build step, no API keys. Songs are stored in the
  browser's localStorage on this computer.
-->

<!-- alphaTab UMD build. The script auto-detects its own CDN folder to load the
     Bravura music notation font, which is why notation looks crisp. -->
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.3/dist/alphaTab.min.js"></script>

<!-- PDF.js (pinned) renders saved PDF tabs to canvas. Used only when a library
     item is a PDF; AlphaTex songs never touch it. -->
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>

<style>
  :root {
    --bg:        #15171c;
    --bg-panel:  #1d2026;
    --bg-input:  #23272f;
    --border:    #30343d;
    --text:      #e6e8ec;
    --text-dim:  #9aa0aa;
    --accent:    #5b9dff;
    --accent-2:  #3a7bdb;
    --danger:    #e5534b;
    --ok:        #3fb950;
    --paper:     #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
  }

  /* Overall app layout: fixed sidebar + flexible main area */
  #app {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- Sidebar (library) ---------- */
  #sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #sidebar header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar header h1 {
    font-size: 15px;
    margin: 0;
    letter-spacing: 0.3px;
  }
  #sidebar header p {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--text-dim);
  }

  #song-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    min-height: 0;
  }
  .song-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text);
  }
  .song-item:hover { background: var(--bg-input); }
  .song-item.active { background: rgba(91,157,255,0.15); }
  .song-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .song-item .del {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 15px;
    padding: 2px 4px;
    border-radius: 5px;
    line-height: 1;
  }
  .song-item:hover .del { opacity: 1; }
  .song-item .del:hover { color: var(--danger); background: rgba(229,83,75,0.12); }

  .empty-note {
    color: var(--text-dim);
    font-size: 12px;
    padding: 16px 12px;
    line-height: 1.5;
  }

  #library-actions {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  #library-actions button { flex: 1; }

  /* ---------- Main area ---------- */
  #main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    flex-wrap: wrap;
  }
  #toolbar .spacer { flex: 1; }

  .field {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .field input[type="text"] {
    width: 130px;
  }

  input[type="text"], textarea {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 7px 9px;
    font-family: inherit;
    font-size: 13px;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  button {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: #fff;
  }
  button.primary:hover { background: var(--accent); border-color: var(--accent); }

  input[type="range"] { accent-color: var(--accent); }

  /* The editor + viewer split the remaining vertical space */
  #workspace {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  #editor-pane {
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  #editor-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
  }
  #editor-head label {
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
  }
  #tex {
    width: 100%;
    height: 150px;
    resize: vertical;
    border: none;
    border-top: 1px solid var(--border);
    border-radius: 0;
    background: #14161b;
    color: #d6dae0;
    font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 12px 16px;
  }

  /* Error banner */
  #error {
    display: none;
    margin: 0;
    padding: 12px 16px;
    background: rgba(229,83,75,0.12);
    border-bottom: 1px solid rgba(229,83,75,0.4);
    color: #ffb4ae;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  #error.show { display: block; }
  #error strong { color: #ff8c82; }

  /* Viewer — the white "paper" sheet sits inside a dark scroll area.
     We keep the sheet on white paper so the default black notation stays
     crisp and readable, exactly like a real printed tab. */
  #viewer-scroll {
    flex: 1;
    overflow: auto;
    padding: 24px;
    min-height: 0;
    background:
      radial-gradient(circle at 50% 0, #21252d, var(--bg) 70%);
  }
  #capo-label {
    display: none;
    max-width: 1000px;
    margin: 0 auto 10px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  #capo-label.show { display: block; }

  #sheet-paper {
    background: var(--paper);
    color: #000;
    max-width: 1000px;
    margin: 0 auto;
    border-radius: 6px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    padding: 28px 32px;
    min-height: 200px;
  }
  /* In PDF mode each page is its own white "paper", so the wrapper goes plain. */
  #sheet-paper.pdf-mode {
    background: transparent;
    box-shadow: none;
    padding: 0;
    max-width: none;
  }
  /* alphaTab renders its SVG into this element */
  #alphatab {  }

  /* PDF pages */
  #pdf-pages { display: none; text-align: center; }
  .pdf-page {
    display: block;
    margin: 0 auto 18px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    max-width: 100%;
    height: auto;
  }

  /* PDF info bar (replaces the editor when viewing a PDF) */
  #pdf-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 13px;
  }
  #pdf-bar .pdf-name { color: var(--text); font-weight: 600; }

  .viewer-placeholder {
    color: #9aa0aa;
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
  }

  /* Small toast for save confirmation */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ok);
    color: #06210d;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 50;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading spinner while alphaTab boots */
  #boot {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="boot">Loading notation engine…</div>

<div id="app">
  <!-- ===================== Sidebar ===================== -->
  <aside id="sidebar">
    <header>
      <h1>🎸 Tab Library</h1>
      <p>Saved on this computer</p>
    </header>
    <div id="song-list"></div>
    <div id="library-actions">
      <button id="btn-export" title="Download all saved songs as a backup file">Export</button>
      <button id="btn-import" title="Load songs from a backup file">Import</button>
      <input type="file" id="import-file" accept="application/json,.json" hidden />
    </div>
  </aside>

  <!-- ===================== Main ===================== -->
  <section id="main">
    <div id="toolbar">
      <button id="btn-render" class="primary">Render</button>
      <button id="btn-save">Save…</button>
      <button id="btn-new">New</button>
      <button id="btn-openpdf" title="Open a PDF tab to view and save">Open PDF…</button>
      <input type="file" id="pdf-file" accept="application/pdf,.pdf" hidden />

      <div class="field">
        <label for="capo">Capo</label>
        <input type="text" id="capo" placeholder="e.g. 7th fret" />
      </div>

      <div class="spacer"></div>

      <div class="field">
        <span>Zoom</span>
        <input type="range" id="zoom" min="0.5" max="2" step="0.1" value="1" />
        <span id="zoom-val" style="width:34px;text-align:right;">100%</span>
      </div>
    </div>

    <div id="workspace">
      <div id="editor-pane">
        <div id="editor-head">
          <label for="tex">AlphaTex — paste your tab here, then press Render (auto-renders as you type)</label>
        </div>
        <textarea id="tex" spellcheck="false" placeholder="Paste AlphaTex here…"></textarea>
      </div>

      <div id="pdf-bar">
        <span>📄 Viewing PDF:</span>
        <span id="pdf-name" class="pdf-name"></span>
        <span class="spacer" style="flex:1"></span>
        <button id="btn-closepdf">Close PDF</button>
      </div>

      <div id="error"></div>

      <div id="viewer-scroll">
        <div id="capo-label"></div>
        <div id="sheet-paper">
          <div id="alphatab"></div>
          <div id="pdf-pages"></div>
        </div>
      </div>
    </div>
  </section>
</div>

<div id="toast"></div>

<script>
"use strict";

/* PDF.js drives its page-render loop with requestAnimationFrame, which browsers
   PAUSE for hidden/background tabs. If you switched tabs mid-render, a PDF could
   stall forever. Fall back to a timer whenever the tab is hidden so rendering
   always finishes; when the tab is visible we use the real (fast) rAF. */
(function () {
  const realRaf = window.requestAnimationFrame.bind(window);
  window.requestAnimationFrame = function (cb) {
    if (document.hidden) return setTimeout(() => cb(performance.now()), 16);
    return realRaf(cb);
  };
})();

/* =========================================================================
   1. Constants & a tiny starter example (proves chord diagrams + lyrics work)
   ========================================================================= */
const STORAGE_KEY   = "guitarTabs.library.v1";   // saved songs
const DRAFT_KEY     = "guitarTabs.draft.v1";      // unsaved editor contents

const STARTER_TEX = `\\title "Welcome"
\\subtitle "Your tab viewer is working"
\\tempo 90
.
\\chord ("C" 0 1 0 2 3 x)
\\chord ("G" 3 0 0 0 2 3)
(0.1 1.2 0.3 2.4 3.5){ch "C" lyrics "Twin-"} (0.1 1.2 0.3){lyrics "kle"} |
(3.1 0.2 0.3 0.4 2.5 3.6){ch "G" lyrics "twin-"} (3.1 0.2 0.3){lyrics "kle"} |`;

/* =========================================================================
   2. Grab elements
   ========================================================================= */
const el = {
  boot:       document.getElementById("boot"),
  songList:   document.getElementById("song-list"),
  tex:        document.getElementById("tex"),
  capo:       document.getElementById("capo"),
  capoLabel:  document.getElementById("capo-label"),
  error:      document.getElementById("error"),
  alphatab:   document.getElementById("alphatab"),
  zoom:       document.getElementById("zoom"),
  zoomVal:    document.getElementById("zoom-val"),
  toast:      document.getElementById("toast"),
  importFile: document.getElementById("import-file"),
  pdfFile:    document.getElementById("pdf-file"),
  pdfPages:   document.getElementById("pdf-pages"),
  pdfBar:     document.getElementById("pdf-bar"),
  pdfName:    document.getElementById("pdf-name"),
  sheet:      document.getElementById("sheet-paper"),
  editorPane: document.getElementById("editor-pane"),
  btnRender:  document.getElementById("btn-render"),
};

let api = null;            // the AlphaTabApi instance
let currentSongId = null;  // which saved song is loaded (null = unsaved draft)
let errorShownForRender = false; // guards against a generic error overwriting a detailed one
let currentMode = "alphatex";    // "alphatex" | "pdf" — what the workspace is showing
let currentPdf = null;           // { name, dataUrl } when a PDF is loaded/being viewed

// Short unique id for a library entry
function newId() {
  return "s_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
}

/* =========================================================================
   3. Helpers: storage
   ========================================================================= */
function loadLibrary() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const data = JSON.parse(raw);
    return Array.isArray(data.songs) ? data.songs : [];
  } catch (e) {
    console.error("Could not read library", e);
    return [];
  }
}
// Returns true on success. The most likely failure is storage being full
// (browsers cap localStorage near 5 MB), usually caused by large saved PDFs.
function saveLibrary(songs) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ songs }));
    return true;
  } catch (e) {
    console.error("Could not save library", e);
    showError(
      "Couldn't save — storage is full.",
      "Your browser's storage (about 5 MB) is full, usually from large PDFs. " +
      "Delete a saved PDF or two, or use Export to back things up, then try again."
    );
    return false;
  }
}
function saveDraft() {
  // Only AlphaTex drafts are persisted — PDFs are too big to stash as a draft,
  // and they're safe in the library once saved.
  if (currentMode === "pdf") return;
  localStorage.setItem(DRAFT_KEY, JSON.stringify({
    tex: el.tex.value,
    capo: el.capo.value,
    currentSongId,
  }));
}
function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

/* =========================================================================
   4. UI helpers
   ========================================================================= */
function showToast(msg) {
  el.toast.textContent = msg;
  el.toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.toast.classList.remove("show"), 1800);
}

function showError(title, detail) {
  el.error.innerHTML = "";
  const strong = document.createElement("strong");
  strong.textContent = title;
  el.error.appendChild(strong);
  if (detail) {
    el.error.appendChild(document.createTextNode("\n" + detail));
  }
  el.error.classList.add("show");
}
function clearError() {
  el.error.classList.remove("show");
  el.error.textContent = "";
}

function updateCapoLabel() {
  const v = el.capo.value.trim();
  if (v) {
    el.capoLabel.textContent = "🎼 Capo: " + v;
    el.capoLabel.classList.add("show");
  } else {
    el.capoLabel.classList.remove("show");
  }
}

/* =========================================================================
   5. alphaTab setup
   ========================================================================= */
function initAlphaTab() {
  const settings = {
    core: {
      // Render on the main thread. For a file you double-click open (file://),
      // this is the most reliable choice and avoids cross-origin worker issues.
      useWorkers: false,
      // Point explicitly at the CDN font folder (belt-and-suspenders alongside
      // alphaTab's own auto-detection) so the music font always loads.
      fontDirectory: "https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.3/dist/font/",
      logLevel: 1,
    },
    display: {
      layoutMode: "page",   // wraps to the page width — good for reading on a laptop
      scale: parseFloat(el.zoom.value),
    },
    notation: {
      // Chord diagrams above the staff + lyrics below are on by default;
      // alphaTab shows them automatically whenever the AlphaTex contains them.
    },
  };

  api = new alphaTab.AlphaTabApi(el.alphatab, settings);

  // Friendly error reporting — never let a bad paste crash the page.
  api.error.on((err) => {
    console.error("alphaTab error:", err);
    const TIP = "\n\nTip: copy this whole message back to your chatbot and ask it to fix the AlphaTex.";

    // alphaTab fires a rich error (with line-numbered diagnostics) and sometimes
    // a second, generic one. Always prefer the detailed diagnostics, and don't let
    // a generic follow-up overwrite a good message we've already shown this cycle.
    const diag = formatDiagnostics(err);
    if (diag) {
      showError("Couldn't render this AlphaTex:", diag + TIP);
      errorShownForRender = true;
    } else if (!errorShownForRender) {
      const msg = (err && (err.message || err.toString())) || "Unknown error";
      showError("Couldn't render this AlphaTex.", cleanErrorMessage(msg) + TIP);
    }
  });

  // scoreLoaded only fires on a successful parse, so it's safe to clear here.
  api.scoreLoaded.on(() => clearError());
}

// alphaTab parse errors can be verbose; surface the useful part.
function cleanErrorMessage(msg) {
  // Most useful info is usually the first line / the "line x" detail.
  return String(msg).split("\n").slice(0, 4).join("\n").trim();
}

// Turn alphaTab's diagnostic collections into friendly, line-numbered text.
// Each diagnostic has: severity (0=hint, 1=warning, 2=error), message, start{line,col}.
function formatDiagnostics(err) {
  if (!err) return null;
  const groups = ["lexerDiagnostics", "parserDiagnostics", "semanticDiagnostics"];
  const lines = [];
  for (const g of groups) {
    const coll = err[g];
    if (!coll) continue;
    try {
      for (const d of coll) {
        if (d && typeof d.severity === "number" && d.severity < 1) continue; // skip hints
        const sev = d.severity === 2 ? "Error" : d.severity === 1 ? "Warning" : "Note";
        const pos = d && d.start ? " (line " + d.start.line + ", col " + d.start.col + ")" : "";
        lines.push("• " + sev + pos + ": " + (d.message || "problem here"));
      }
    } catch (e) { /* collection not iterable — ignore and fall back */ }
  }
  return lines.length ? lines.join("\n") : null;
}

/* =========================================================================
   6. Rendering
   ========================================================================= */
function render() {
  const tex = el.tex.value;
  updateCapoLabel();
  errorShownForRender = false;   // reset before this render's error events fire
  if (!tex.trim()) {
    clearError();
    api.tex("");   // clears the sheet
    return;
  }
  clearError();
  try {
    // tex() parses + renders. Parse errors come back via the api.error event.
    api.tex(tex);
  } catch (e) {
    showError("Couldn't render this AlphaTex.", cleanErrorMessage(e.message || e));
  }
}

// Debounced auto-render as you type
let renderTimer = null;
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 450);
  saveDraft();
}

/* --- Mode switching: AlphaTex editor vs PDF viewer --- */
function setMode(mode) {
  currentMode = mode;
  const pdf = mode === "pdf";
  el.editorPane.style.display = pdf ? "none" : "";
  el.pdfBar.style.display     = pdf ? "flex" : "none";
  el.btnRender.style.display  = pdf ? "none" : "";
  el.alphatab.style.display   = pdf ? "none" : "";
  el.pdfPages.style.display   = pdf ? "block" : "none";
  el.sheet.classList.toggle("pdf-mode", pdf);
  if (pdf && currentPdf) el.pdfName.textContent = currentPdf.name || "PDF";
}

/* --- Open a PDF chosen from disk --- */
function openPdfFile(file) {
  if (!file) return;
  const looksPdf = (file.type && file.type.indexOf("pdf") !== -1) || /\.pdf$/i.test(file.name);
  if (!looksPdf) {
    showError("That's not a PDF.", "Please choose a .pdf file.");
    return;
  }
  if (typeof pdfjsLib === "undefined") {
    showError("PDF viewer didn't load.", "Check your internet connection and reload, then try again.");
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    currentPdf = { name: file.name.replace(/\.pdf$/i, ""), dataUrl: reader.result };
    currentSongId = null;            // a freshly opened, not-yet-saved PDF
    setMode("pdf");
    renderSongList();
    renderPdf(reader.result);
  };
  reader.onerror = () => showError("Couldn't read that PDF.", "Please try again.");
  reader.readAsDataURL(file);
}

/* --- Render a PDF (all pages) to canvases at the current zoom --- */
let pdfRenderToken = 0;   // lets a newer render cancel an in-flight older one
function renderPdf(dataUrl) {
  clearError();
  const token = ++pdfRenderToken;
  el.pdfPages.innerHTML = '<div class="viewer-placeholder">Loading PDF…</div>';
  const scale = parseFloat(el.zoom.value) * 1.5;   // 1.5 ≈ a comfortable default size
  const ratio = window.devicePixelRatio || 1;

  pdfjsLib.getDocument({ data: dataUrlToUint8(dataUrl) }).promise.then(async (pdf) => {
    if (token !== pdfRenderToken) return;          // superseded
    el.pdfPages.innerHTML = "";
    for (let n = 1; n <= pdf.numPages; n++) {
      const page = await pdf.getPage(n);
      if (token !== pdfRenderToken) return;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement("canvas");
      canvas.className = "pdf-page";
      const ctx = canvas.getContext("2d");
      canvas.width  = Math.floor(viewport.width  * ratio);
      canvas.height = Math.floor(viewport.height * ratio);
      canvas.style.width  = viewport.width + "px";
      canvas.style.height = viewport.height + "px";
      el.pdfPages.appendChild(canvas);
      await page.render({
        canvasContext: ctx,
        viewport,
        transform: ratio !== 1 ? [ratio, 0, 0, ratio, 0, 0] : null,
      }).promise;
    }
  }).catch((e) => {
    if (token !== pdfRenderToken) return;
    console.error("PDF error:", e);
    el.pdfPages.innerHTML = "";
    showError("Couldn't open this PDF.",
      (e && e.message) || "The file may be damaged or password-protected.");
  });
}

// PDFs are stored as data: URLs; PDF.js wants the raw bytes. Decode each time
// (getDocument consumes the buffer, so re-renders need a fresh copy).
function dataUrlToUint8(dataUrl) {
  const base64 = String(dataUrl).split(",")[1] || "";
  const bin = atob(base64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// Leave PDF view and return to the AlphaTex editor
function closePdf() {
  currentPdf = null;
  currentSongId = null;
  el.pdfPages.innerHTML = "";
  setMode("alphatex");
  renderSongList();
  render();
}

/* =========================================================================
   7. Library rendering & actions
   ========================================================================= */
function renderSongList() {
  const songs = loadLibrary();
  el.songList.innerHTML = "";

  if (songs.length === 0) {
    const note = document.createElement("div");
    note.className = "empty-note";
    note.textContent = "No saved songs yet. Paste some AlphaTex and press “Save…” to add one.";
    el.songList.appendChild(note);
    return;
  }

  songs.forEach((song) => {
    const item = document.createElement("div");
    item.className = "song-item" + (song.id === currentSongId ? " active" : "");

    const name = document.createElement("span");
    name.className = "name";
    const icon = song.type === "pdf" ? "📄 " : "🎵 ";
    name.textContent = icon + song.name;
    name.title = song.name;

    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "✕";
    del.title = "Delete this song";
    del.addEventListener("click", (ev) => {
      ev.stopPropagation();
      deleteSong(song.id);
    });

    item.appendChild(name);
    item.appendChild(del);
    item.addEventListener("click", () => loadSong(song.id));
    el.songList.appendChild(item);
  });
}

function loadSong(id) {
  const song = loadLibrary().find((s) => s.id === id);
  if (!song) return;
  currentSongId = id;
  el.capo.value = song.capo || "";
  updateCapoLabel();

  if (song.type === "pdf" && song.pdfData) {
    currentPdf = { name: song.name, dataUrl: song.pdfData };
    setMode("pdf");
    renderSongList();
    renderPdf(song.pdfData);
  } else {
    currentPdf = null;
    el.tex.value = song.tex || "";
    setMode("alphatex");
    saveDraft();
    renderSongList();
    render();
  }
}

function saveSong() {
  const isPdf = currentMode === "pdf";

  if (isPdf) {
    if (!currentPdf) { showError("Nothing to save.", "Open a PDF first."); return; }
  } else if (!el.tex.value.trim()) {
    showError("Nothing to save.", "Paste some AlphaTex into the editor first.");
    return;
  }

  const songs = loadLibrary();
  const existing = currentSongId ? songs.find((s) => s.id === currentSongId) : null;

  const defaultName = existing ? existing.name
                    : isPdf ? (currentPdf.name || "Untitled PDF")
                    : guessTitle(el.tex.value);
  const name = prompt("Save song as:", defaultName);
  if (name === null) return;                 // user cancelled
  const trimmed = name.trim();
  if (!trimmed) return;

  // Build the fields for the current item type
  const fields = isPdf
    ? { type: "pdf",      tex: "",                  pdfData: currentPdf.dataUrl }
    : { type: "alphatex", tex: el.tex.value.trim(), pdfData: "" };

  if (existing && existing.name === trimmed) {
    // Update the currently loaded song in place
    Object.assign(existing, fields, { capo: el.capo.value.trim() });
    if (!saveLibrary(songs)) return;
  } else {
    // New entry (or "save as" under a new name)
    const song = Object.assign(
      { id: newId(), name: trimmed, capo: el.capo.value.trim() },
      fields
    );
    songs.push(song);
    if (!saveLibrary(songs)) return;
    currentSongId = song.id;
  }
  saveDraft();
  renderSongList();
  showToast("Saved “" + trimmed + "”");
}

// Pull a sensible default name from a \title "..." line if present
function guessTitle(tex) {
  const m = tex.match(/\\title\s+"([^"]+)"/);
  return m ? m[1] : "Untitled";
}

function deleteSong(id) {
  const songs = loadLibrary();
  const song = songs.find((s) => s.id === id);
  if (!song) return;
  if (!confirm("Delete “" + song.name + "”? This cannot be undone.")) return;
  const next = songs.filter((s) => s.id !== id);
  saveLibrary(next);
  if (currentSongId === id) currentSongId = null;
  renderSongList();
}

function newSong() {
  currentSongId = null;
  currentPdf = null;
  el.tex.value = "";
  el.capo.value = "";
  setMode("alphatex");
  saveDraft();
  renderSongList();
  render();
  el.tex.focus();
}

/* =========================================================================
   8. Export / Import
   ========================================================================= */
function exportLibrary() {
  const songs = loadLibrary();
  if (songs.length === 0) {
    showError("Nothing to export.", "Your library is empty.");
    return;
  }
  const payload = {
    app: "guitar-tab-viewer",
    version: 1,
    exportedAt: new Date().toISOString(),
    songs,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = "guitar-tabs-backup-" + stamp + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast("Exported " + songs.length + " song" + (songs.length === 1 ? "" : "s"));
}

function importLibrary(file) {
  const reader = new FileReader();
  reader.onload = () => {
    let incoming;
    try {
      incoming = JSON.parse(reader.result);
    } catch {
      showError("Couldn't read that file.", "It doesn't look like valid JSON.");
      return;
    }
    const incomingSongs = Array.isArray(incoming) ? incoming
                        : Array.isArray(incoming.songs) ? incoming.songs
                        : null;
    if (!incomingSongs) {
      showError("Couldn't import.", "This file doesn't contain a song list.");
      return;
    }

    const existing = loadLibrary();
    const mode = existing.length === 0 ? "replace" :
      (confirm(
        "Import " + incomingSongs.length + " song(s).\n\n" +
        "OK = MERGE with your current library\n" +
        "Cancel = REPLACE your current library"
      ) ? "merge" : "replace");

    let merged;
    if (mode === "merge") {
      // Keep existing, add incoming, regenerating ids to avoid collisions
      const add = incomingSongs.map(normalizeSong).filter(Boolean);
      merged = existing.concat(add);
    } else {
      merged = incomingSongs.map(normalizeSong).filter(Boolean);
    }
    saveLibrary(merged);
    renderSongList();
    showToast("Imported " + incomingSongs.length + " song(s)");
  };
  reader.onerror = () => showError("Couldn't read that file.", "Please try again.");
  reader.readAsText(file);
}

function normalizeSong(s) {
  if (!s) return null;
  const capo = s.capo ? String(s.capo) : "";
  const isPdf = s.type === "pdf" || (!!s.pdfData && !s.tex);

  if (isPdf) {
    if (!s.pdfData) return null;
    return {
      id: newId(),
      name: s.name ? String(s.name) : "Untitled PDF",
      type: "pdf",
      tex: "",
      pdfData: String(s.pdfData),
      capo,
    };
  }

  if (typeof s.tex !== "string") return null;
  return {
    id: newId(),
    name: (s.name && String(s.name)) || guessTitle(s.tex),
    type: "alphatex",
    tex: s.tex,
    pdfData: "",
    capo,
  };
}

/* =========================================================================
   9. Zoom
   ========================================================================= */
let zoomTimer = null;
function applyZoom() {
  const z = parseFloat(el.zoom.value);
  el.zoomVal.textContent = Math.round(z * 100) + "%";
  // Debounce the actual re-render so dragging the slider stays smooth
  // (re-rendering every PDF page on each tick would lag).
  clearTimeout(zoomTimer);
  zoomTimer = setTimeout(() => {
    if (currentMode === "pdf") {
      if (currentPdf) renderPdf(currentPdf.dataUrl);
    } else if (api) {
      api.settings.display.scale = z;
      api.updateSettings();
      api.render();
    }
  }, 180);
}

/* =========================================================================
   10. Wire up events & boot
   ========================================================================= */
function wireEvents() {
  document.getElementById("btn-render").addEventListener("click", render);
  document.getElementById("btn-save").addEventListener("click", saveSong);
  document.getElementById("btn-new").addEventListener("click", newSong);
  document.getElementById("btn-export").addEventListener("click", exportLibrary);
  document.getElementById("btn-import").addEventListener("click", () => el.importFile.click());
  document.getElementById("btn-openpdf").addEventListener("click", () => el.pdfFile.click());
  document.getElementById("btn-closepdf").addEventListener("click", closePdf);

  el.importFile.addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) importLibrary(e.target.files[0]);
    e.target.value = "";   // allow re-importing the same file
  });
  el.pdfFile.addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) openPdfFile(e.target.files[0]);
    e.target.value = "";   // allow re-opening the same file
  });

  el.tex.addEventListener("input", scheduleRender);
  el.capo.addEventListener("input", () => { updateCapoLabel(); saveDraft(); });
  el.zoom.addEventListener("input", applyZoom);
}

function boot() {
  if (typeof alphaTab === "undefined" || !alphaTab.AlphaTabApi) {
    el.boot.textContent =
      "Couldn't load the notation engine. Check your internet connection and reload.";
    return;
  }

  // Point PDF.js at its matching CDN worker (pinned to the same version).
  if (typeof pdfjsLib !== "undefined") {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  }

  initAlphaTab();
  wireEvents();
  setMode("alphatex");
  renderSongList();

  // Restore last editing session, or fall back to the starter example.
  const draft = loadDraft();
  if (draft && (draft.tex || draft.capo)) {
    el.tex.value = draft.tex || "";
    el.capo.value = draft.capo || "";
    currentSongId = draft.currentSongId || null;
  } else {
    el.tex.value = STARTER_TEX;
  }

  el.zoomVal.textContent = Math.round(parseFloat(el.zoom.value) * 100) + "%";
  updateCapoLabel();
  renderSongList();
  render();

  // Hide the boot overlay once alphaTab has drawn at least once.
  api.renderFinished.on(() => { el.boot.style.display = "none"; });
  // Safety: hide it anyway after a moment in case of an empty editor.
  setTimeout(() => { el.boot.style.display = "none"; }, 2500);
}

// alphaTab's script is loaded synchronously in <head>, so it's ready now.
boot();
</script>
</body>
</html>
